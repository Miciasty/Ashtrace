name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Get commit SHA
      id: vars
      run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Rename JAR with commit SHA
      run: |
        original_jar=$(find target -maxdepth 1 -type f -name '*.jar' ! -name '*-sources.jar' ! -name '*-javadoc.jar' ! -name 'original-*.jar' | sort | head -n 1)
        if [ -z "$original_jar" ]; then
          echo "Main artifact JAR not found in target/"
          exit 1
        fi
        commit_sha=${{ steps.vars.outputs.sha_short }}
        new_jar_name="target/$(basename "$original_jar" .jar)-$commit_sha.jar"
        mv "$original_jar" "$new_jar_name"

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: built-jar-${{ steps.vars.outputs.sha_short }}
        path: target/*-${{ steps.vars.outputs.sha_short }}.jar
